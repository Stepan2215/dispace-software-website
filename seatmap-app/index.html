<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var base = document.createElement("base");
        var isSeatMapPath = window.location.pathname.indexOf("/seatmap-app/") === 0;
        base.href = isSeatMapPath
          ? new URL("./", window.location.href).href
          : new URL("/seatmap-app/", window.location.origin).href;
        document.head.prepend(base);
        var params = new URLSearchParams(window.location.search);
        var urlLanguage = params.get("lang");
        var siteLanguage = window.localStorage.getItem("dispace-language");
        var currentLanguage = window.localStorage.getItem("restaurant-lang");
        var nextLanguage = ["ru", "en", "bg"].indexOf(urlLanguage) !== -1
          ? urlLanguage
          : ["ru", "en", "bg"].indexOf(siteLanguage) !== -1
            ? siteLanguage
            : currentLanguage || "ru";
        window.localStorage.setItem("restaurant-lang", nextLanguage);
      })();
    </script>
